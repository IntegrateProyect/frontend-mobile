name: orientate
description: "Aplicación móvil inteligente de orientación vocacional."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  intl: ^0.19.0
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2
  confetti: ^0.7.0
  socket_io_client: ^3.0.0

  
  # Game Engine
  flame: ^1.18.0
  flame_forge2d: ^0.17.0

  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # DI & Routing
  get_it: ^7.7.0
  go_router: ^14.2.0  # Navigation 2.0
  
  # Responsive & Adaptive
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.4.0
  flutter_platform_widgets: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/.env
